<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <link rel="shortcut icon" type="aidil-icon" href="/static/img/aidil_icon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}Muhammad Aidil | Research Scientist{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #0a0d12;
      --surface:   #111520;
      --border:    #1e2535;
      --accent:    #e8532a;
      --accent2:   #f0a500;
      --text:      #e2e8f0;
      --muted:     #64748b;
      --serif:     'DM Serif Display', Georgia, serif;
      --sans:      'DM Sans', sans-serif;
      --mono:      'JetBrains Mono', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-weight: 300;
      line-height: 1.7;
      min-height: 100vh;
    }

    /* ── NAV ── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.2rem 4rem;
      background: rgba(10,13,18,0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }
    .nav-logo {
      font-family: var(--serif);
      font-size: 1.25rem;
      color: var(--text);
      text-decoration: none;
      letter-spacing: 0.02em;
    }
    .nav-logo span { color: var(--accent); }
    .nav-links { display: flex; gap: 2.5rem; list-style: none; }
    .nav-links a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--text); }

    /* ── PAGE WRAPPER ── */
    .page { padding-top: 80px; }

    /* ── SHARED SECTION ── */
    section { padding: 6rem 4rem; }
    .section-label {
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--accent);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 1rem;
    }
    h2 {
      font-family: var(--serif);
      font-size: clamp(2rem, 4vw, 3rem);
      font-weight: 400;
      line-height: 1.15;
      margin-bottom: 1.5rem;
    }

    /* ── FOOTER ── */
    footer {
      border-top: 1px solid var(--border);
      padding: 2rem 4rem;
      display: flex; justify-content: space-between; align-items: center;
    }
    footer p { color: var(--muted); font-size: 0.8rem; }
    footer a { color: var(--accent); text-decoration: none; font-size: 0.8rem; }

    /* ── UTILITY ── */
    .tag {
      display: inline-block;
      font-family: var(--mono);
      font-size: 0.7rem;
      padding: 0.25rem 0.7rem;
      border: 1px solid var(--border);
      border-radius: 2px;
      color: var(--muted);
      letter-spacing: 0.05em;
    }
    .tag.accent { border-color: var(--accent); color: var(--accent); }
    .tag.amber  { border-color: var(--accent2); color: var(--accent2); }

    .btn {
      display: inline-flex; align-items: center; gap: 0.5rem;
      padding: 0.75rem 1.75rem;
      font-family: var(--sans); font-size: 0.85rem; font-weight: 500;
      letter-spacing: 0.06em; text-transform: uppercase;
      text-decoration: none;
      border: 1px solid;
      transition: all 0.2s;
      cursor: pointer;
    }
    .btn-primary {
      background: var(--accent); border-color: var(--accent); color: #fff;
    }
    .btn-primary:hover { background: transparent; color: var(--accent); }
    .btn-outline {
      background: transparent; border-color: var(--border); color: var(--muted);
    }
    .btn-outline:hover { border-color: var(--text); color: var(--text); }

    @media (max-width: 768px) {
      nav { padding: 1rem 1.5rem; }
      section { padding: 4rem 1.5rem; }
      footer { padding: 1.5rem; flex-direction: column; gap: 0.5rem; text-align: center; }
    }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  <nav>
    <a href="/" class="nav-logo">Aidil<span>.</span></a>
    <ul class="nav-links">
      <li><a href="/#about">About</a></li>
      <li><a href="/#skills">Skills</a></li>
      <li><a href="/#projects">Projects</a></li>
      <li><a href="/#contact">Contact</a></li>
    </ul>
  </nav>

  <div class="page">
    {% block content %}{% endblock %}
  </div>

  <footer>
    <p>© 2025 Muhammad Aidil bin Juhari</p>
    <a href="https://www.linkedin.com/in/maidilj" target="_blank">LinkedIn ↗</a>
  </footer>
</body>
</html>
